<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance with Photo → Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input, select, button {
            padding: 10px;
            margin: 5px 2px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button.danger {
            background: #e74c3c;
        }
        button.small {
            padding: 5px 10px;
            font-size: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background: #4CAF50;
            color: white;
        }
        #video {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            display: none;
            margin: 10px auto;
        }
        #canvas {
            display: none;
        }
        .photo-preview {
            max-width: 100px;
            max-height: 100px;
            border-radius: 6px;
            margin: 5px;
        }
        .note {
            font-size: 12px;
            color: #666;
        }
        #submitForm {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📸 School Attendance - Photo ke saath Email</h2>
        <p class="note">✔ Form verified | Email: masudurrahmankhan994@gmail.com</p>

        <!-- Input Form -->
        <div>
            <label>Naam: <input type="text" id="name" placeholder="Student/Staff naam"></label><br>
            <label>Date: <input type="date" id="date"></label><br>
            <label>Status:
                <select id="status">
                    <option value="Present">Present</option>
                    <option value="Absent">Absent</option>
                    <option value="Late">Late</option>
                </select>
            </label><br>
            <p>📷 Photo (webcam ya file):</p>
            <button onclick="startCamera()">🎥 Webcam On</button>
            <button onclick="capturePhoto()" id="captureBtn" disabled>📸 Photo Kheencho</button>
            <input type="file" id="fileInput" accept="image/*" onchange="previewFile()">
            <br>
            <video id="video" autoplay></video>
            <canvas id="canvas"></canvas>
            <img id="preview" class="photo-preview" style="display:none;">
            <br>
            <button onclick="markAttendance()">✔ Local Save</button>
        </div>

        <!-- Records Table -->
        <h3>📋 Saved Records</h3>
        <table id="recordTable">
            <thead>
                <tr>
                    <th>Naam</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Photo</th>
                    <th>Email</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="clearAll()" class="danger small">🗑 Saaf karein</button>
        <p class="note">* 📧 Send dabane se aap Formspree ke Thank You page par pahunch jayenge (iska matlab email chala gaya).</p>
    </div>

    <!-- Hidden form for direct submission to Formspree -->
    <form id="submitForm" action="https://formspree.io/f/mzdnrndl" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="name" id="formName">
        <input type="hidden" name="date" id="formDate">
        <input type="hidden" name="status" id="formStatus">
        <input type="file" name="photo" id="formPhoto" style="display:none;">
    </form>

    <script>
        // ✅ Formspree endpoint already set in form action
        let photoData = null;
        document.getElementById('date').value = new Date().toISOString().split('T')[0];

        // ----- Webcam -----
        let stream = null;
        async function startCamera() {
            const video = document.getElementById('video');
            const captureBtn = document.getElementById('captureBtn');
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.style.display = 'block';
                captureBtn.disabled = false;
            } catch (err) {
                alert('Camera available nahi hai, file choose karein.');
            }
        }

        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const preview = document.getElementById('preview');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            photoData = canvas.toDataURL('image/jpeg', 0.8);
            preview.src = photoData;
            preview.style.display = 'inline-block';
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
                document.getElementById('captureBtn').disabled = true;
            }
            document.getElementById('fileInput').value = '';
        }

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                photoData = e.target.result;
                document.getElementById('preview').src = photoData;
                document.getElementById('preview').style.display = 'inline-block';
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    document.getElementById('video').style.display = 'none';
                    document.getElementById('captureBtn').disabled = true;
                }
            };
            reader.readAsDataURL(file);
        }

        // ----- Local storage -----
        function getRecords() {
            return JSON.parse(localStorage.getItem('attendanceRecords')) || [];
        }

        function saveRecords(records) {
            localStorage.setItem('attendanceRecords', JSON.stringify(records));
        }

        function markAttendance() {
            const name = document.getElementById('name').value.trim();
            const date = document.getElementById('date').value;
            const status = document.getElementById('status').value;
            if (!name || !date) {
                alert('Naam aur date bharna zaroori hai.');
                return;
            }
            const record = { name, date, status, photo: photoData };
            const records = getRecords();
            records.push(record);
            saveRecords(records);
            document.getElementById('name').value = '';
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            document.getElementById('preview').style.display = 'none';
            photoData = null;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                document.getElementById('video').style.display = 'none';
                document.getElementById('captureBtn').disabled = true;
            }
            document.getElementById('fileInput').value = '';
            showRecords();
        }

        function showRecords() {
            const records = getRecords();
            const tbody = document.querySelector('#recordTable tbody');
            tbody.innerHTML = '';
            records.forEach((rec, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${rec.name}</td>
                    <td>${rec.date}</td>
                    <td>${rec.status}</td>
                    <td>${rec.photo ? `<img src="${rec.photo}" class="photo-preview">` : 'No photo'}</td>
                    <td><button onclick="sendEmail(${index})">📧 Send</button></td>
                    <td><button class="danger small" onclick="deleteRecord(${index})">❌</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        function deleteRecord(index) {
            const records = getRecords();
            records.splice(index, 1);
            saveRecords(records);
            showRecords();
        }

        function clearAll() {
            if (confirm('Saare records delete honge. Confirm?')) {
                localStorage.removeItem('attendanceRecords');
                showRecords();
            }
        }

        // ----- Send via direct form submission (no fetch, no CORS) -----
        async function sendEmail(index) {
            const records = getRecords();
            const rec = records[index];
            if (!rec) return;

            // Fill hidden text fields
            document.getElementById('formName').value = rec.name;
            document.getElementById('formDate').value = rec.date;
            document.getElementById('formStatus').value = rec.status;

            // Handle photo
            const photoInput = document.getElementById('formPhoto');
            if (rec.photo) {
                // Convert base64 to blob and then to File
                const blob = await (await fetch(rec.photo)).blob();
                const file = new File([blob], "attendance_photo.jpg", { type: blob.type || "image/jpeg" });
                // Create a DataTransfer to set file input value (modern browsers)
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                photoInput.files = dataTransfer.files;
            } else {
                // Clear previous selection
                photoInput.value = '';
            }

            // Submit the form (will open Formspree thank-you page)
            document.getElementById('submitForm').submit();
        }

        // Load records on page load
        showRecords();
    </script>
</body>
</html>
